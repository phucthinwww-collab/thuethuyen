<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dã Ngoại Đắk Nông</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{font-family:'Be Vietnam Pro',sans-serif;scroll-behavior:smooth}
h1,h2,h3{font-family:'Montserrat',sans-serif}

.glass{background:rgba(255,255,255,.9);backdrop-filter:blur(10px)}
.hero-gradient{background:linear-gradient(0deg,rgba(0,0,0,.7),rgba(0,0,0,.3))}

.card-hover{transition:.4s}
.card-hover:hover{transform:translateY(-10px) scale(1.02)}
.btn-glow:hover{box-shadow:0 10px 25px rgba(255,115,0,.5)}
</style>
</head>

<body class="bg-slate-50 text-sm md:text-base">

<!-- HEADER -->
<nav class="fixed w-full z-50 glass border-b">
<div class="max-w-7xl mx-auto px-4 flex justify-between items-center py-3">
<div class="flex items-center">
<div class="bg-green-700 text-white p-2 rounded-lg mr-2">
<i class="fas fa-mountain-sun"></i>
</div>
<span class="font-extrabold text-green-900 text-sm md:text-xl uppercase">
Đắk Nông<br><span class="text-xs">Outdoor</span>
</span>
</div>

<a href="tel:0896365048" class="bg-orange-500 text-white px-5 py-2 rounded-full font-bold text-sm animate-pulse btn-glow">
GỌI NGAY
</a>
</div>
</nav>

<!-- HERO -->
<section class="relative min-h-[70vh] md:h-[90vh] flex items-end pb-16 overflow-hidden">
<img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=1200&q=80" class="absolute inset-0 w-full h-full object-cover">
<div class="absolute inset-0 hero-gradient"></div>

<div class="max-w-7xl mx-auto px-6 text-white relative z-10">
<div class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs inline-block mb-4">
⭐ 5/5
</div>

<h1 class="text-3xl sm:text-4xl md:text-6xl font-extrabold mb-4">
Trải Nghiệm<br><span class="text-orange-400">Thiên Nhiên</span>
</h1>

<p class="mb-6 max-w-lg">
Thuê lều, SUP, phụ kiện. Giá từ <b class="border-b-2 border-orange-500">1k - 100k</b>
</p>

<a href="#" class="bg-white text-green-900 px-6 py-3 rounded-xl font-bold hover:bg-orange-500 hover:text-white">
Nhắn Facebook
</a>
</div>
</section>

<!-- INFO -->
<section class="py-10 bg-green-900 text-white text-center">
<div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-6">
<div><b class="text-orange-400 text-xl">24/7</b><p class="text-xs">Mở cửa</p></div>
<div><b class="text-orange-400 text-xl">Kiến Đức</b><p class="text-xs">Vị trí</p></div>
<div><b class="text-orange-400 text-xl">1k-100k</b><p class="text-xs">Giá</p></div>
<div><b class="text-orange-400 text-xl">5⭐</b><p class="text-xs">Uy tín</p></div>
</div>
</section>

<!-- SERVICES -->
<section class="py-16 max-w-7xl mx-auto px-4">
<h2 class="text-3xl font-extrabold text-center mb-10">Dịch vụ</h2>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

<div class="card-hover rounded-2xl overflow-hidden shadow-lg h-80 relative">
<img src="https://images.unsplash.com/photo-1517176118179-65244ad0e59a" class="w-full h-full object-cover">
<div class="absolute inset-0 bg-black/40 flex items-end p-4 text-white">SUP</div>
</div>

<div class="card-hover rounded-2xl overflow-hidden shadow-lg h-80 relative">
<img src="https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7" class="w-full h-full object-cover">
<div class="absolute inset-0 bg-black/40 flex items-end p-4 text-white">Lều trại</div>
</div>

<div class="card-hover rounded-2xl overflow-hidden shadow-lg h-80 relative">
<img src="https://images.unsplash.com/photo-1551632432-c7d5194f1473" class="w-full h-full object-cover">
<div class="absolute inset-0 bg-black/40 flex items-end p-4 text-white">Phụ kiện</div>
</div>

</div>
</section>

<!-- CONTACT -->
<section class="py-16 bg-slate-100">
<div class="max-w-7xl mx-auto px-4 grid md:grid-cols-2 gap-10">

<div>
<h2 class="text-2xl font-bold mb-4">Liên hệ</h2>
<p>Kiến Đức - Đắk Nông</p>
<p class="font-bold text-lg mt-2">0896 365 048</p>
</div>

<iframe class="w-full h-[300px] rounded-xl"
src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d15582.44!2d107.6!3d11.9"
loading="lazy"></iframe>

</div>
</section>

<!-- MOBILE BUTTON -->
<div class="fixed bottom-3 left-3 right-3 md:hidden flex gap-3">
<a href="tel:0896365048" class="flex-1 bg-green-700 text-white py-3 rounded-xl text-center font-bold">
GỌI
</a>
<a href="#" class="flex-1 bg-white py-3 rounded-xl text-center font-bold">
MAP
</a>
</div>

<script>
window.addEventListener("scroll",()=>{
let nav=document.querySelector("nav");
window.scrollY>50?nav.classList.add("shadow-lg"):nav.classList.remove("shadow-lg");
});
</script>

</body>
</html>
